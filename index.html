<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Talk">
<meta name="color-scheme" content="light dark">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" href="./icon-180.png">
<title>Talk Board</title>
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --ink: #1a2233;
    --muted: #5a6478;
    --green: #1e7d3c;
    --green-bg: #d9f2e0;
    --red: #b3261e;
    --red-bg: #fde3e1;
    --blue: #1a56a8;
    --blue-bg: #e2ecfa;
    --amber-bg: #fdf0d5;
    --radius: 22px;
    --shadow: 0 2px 8px rgba(26,34,51,.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
  }
  button { font-family: inherit; color: inherit; border: none; cursor: pointer; }
  button:active { transform: scale(.97); filter: brightness(.95); }

  /* ---------- persistent top bar: YES / NO / HOME ---------- */
  #topbar { display: flex; gap: 10px; padding: 10px 10px 4px; }
  #topbar button {
    border-radius: var(--radius); box-shadow: var(--shadow);
    font-weight: 800; min-height: 88px;
  }
  #btn-yes { flex: 3; background: var(--green-bg); color: var(--green); font-size: clamp(30px, 6vw, 52px); }
  /* image-dominant overlay in his modes: picture huge, word secondary */
  #big.lite .em { font-size: clamp(110px, 26vw, 300px); }
  #big.lite .txt { font-size: clamp(34px, 6.5vw, 84px); }
  #big.lite img.pic { width: clamp(200px, 36vw, 420px); height: clamp(170px, 30vw, 350px); }
  #btn-no  { flex: 3; background: var(--red-bg);  color: var(--red);  font-size: clamp(30px, 6vw, 52px); }
  #btn-again { flex: 1; background: var(--blue-bg); color: var(--blue); font-size: clamp(24px, 4vw, 36px); }
  #btn-home { flex: 1; background: var(--card); color: var(--muted); font-size: clamp(24px, 4vw, 36px); }

  /* ---------- screens ---------- */
  #screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; }
  .screen-title {
    font-size: clamp(22px, 3.5vw, 30px); font-weight: 700; color: var(--muted);
    margin: 4px 6px 12px; display: flex; align-items: center; gap: 12px;
  }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(var(--tilemin, 160px), 1fr)); }
  .grid.big { grid-template-columns: repeat(auto-fill, minmax(calc(var(--tilemin, 160px) + 60px), 1fr)); }
  /* image-first tiles: the picture is what he recognises — the word is secondary */
  .tile {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    min-height: 180px; padding: 14px 10px 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    text-align: center;
  }
  .grid.big .tile { min-height: 220px; }
  .tile .em { font-size: clamp(64px, 10vw, 104px); line-height: 1.05; }
  .tile .lbl { font-size: clamp(18px, 2.4vw, 24px); font-weight: 700; line-height: 1.15; }
  .tile.nav { background: var(--blue-bg); color: var(--blue); }
  /* "read them out" highlight: follows the spoken word tile by tile */
  .tile.reading { outline: 6px solid var(--blue); outline-offset: -3px; }
  .tile.warn { background: var(--amber-bg); }
  .tile img.face {
    width: clamp(100px, 15vw, 160px); height: clamp(100px, 15vw, 160px);
    border-radius: 50%; object-fit: cover; border: 3px solid #e7e2d8;
  }
  .tile img.pic { width: clamp(104px, 16vw, 176px); height: clamp(104px, 16vw, 176px); object-fit: contain; }
  .tile img.pic.photo { object-fit: cover; border-radius: 16px; width: clamp(130px, 20vw, 220px); height: clamp(104px, 16vw, 176px); }
  /* his modes (Simple / Yes-No): few tiles, so fill the screen with them — picture huge */
  .grid.fill2 { grid-template-columns: repeat(2, 1fr); }
  .grid.fill2 .tile { min-height: 36vh; }
  .grid.fill2 .tile img.pic { width: min(46vw, 34vh); height: min(46vw, 30vh); }
  .grid.fill2 .tile img.pic.photo { width: min(60vw, 44vh); height: min(46vw, 30vh); }
  .grid.fill2 .tile .em { font-size: min(24vw, 24vh); }
  .grid.fill2 .tile .lbl { font-size: clamp(24px, 4.2vh, 40px); }
  /* 5+ tiles: more columns on wide screens, slightly smaller so it still fits without scrolling */
  .grid.fill2.many { grid-template-columns: repeat(auto-fit, minmax(min(46%, 270px), 1fr)); }
  .grid.fill2.many .tile { min-height: 22vh; }
  .grid.fill2.many .tile img.pic { width: min(22vw, 20vh); height: min(22vw, 17vh); }
  .grid.fill2.many .tile img.pic.photo { width: min(28vw, 26vh); height: min(22vw, 17vh); }
  .grid.fill2.many .tile .em { font-size: min(15vw, 14vh); }
  .grid.fill2.many .tile .lbl { font-size: clamp(20px, 3.2vh, 32px); }
  @media (orientation: landscape) and (min-width: 700px) {
    .grid.fill2.many .tile { min-height: 33vh; }
    .grid.fill2.many .tile img.pic { width: min(22vw, 25vh); height: min(22vw, 22vh); }
    .grid.fill2.many .tile img.pic.photo { width: min(28vw, 32vh); height: min(22vw, 22vh); }
    .grid.fill2.many .tile .em { font-size: min(15vw, 18vh); }
  }
  .backbtn {
    background: var(--card); border-radius: 14px; box-shadow: var(--shadow);
    font-size: clamp(18px, 2.6vw, 24px); font-weight: 700; color: var(--muted);
    padding: 12px 22px;
  }

  /* ---------- big display overlay ---------- */
  #big {
    position: fixed; inset: 0; z-index: 50; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    /* fixed dark panel in BOTH themes — never derive from --ink, which is light in dark mode */
    background: #10141c; color: #fff; text-align: center; padding: 4vw; gap: 3vh;
  }
  #big.show { display: flex; }
  #big .em { font-size: clamp(70px, 16vw, 180px); line-height: 1; }
  #big img.face { width: clamp(140px, 24vw, 260px); height: clamp(140px, 24vw, 260px); border-radius: 50%; object-fit: cover; border: 5px solid #fff; }
  #big img.pic { width: clamp(130px, 22vw, 240px); height: clamp(130px, 22vw, 240px); object-fit: contain; background: #fff; border-radius: 24px; padding: 10px; }
  #big img.pic.photo { object-fit: cover; padding: 0; width: clamp(180px, 30vw, 340px); height: clamp(150px, 24vw, 270px); }
  #big .txt { font-size: clamp(44px, 9vw, 120px); font-weight: 800; line-height: 1.1; }
  #big .row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  #big button {
    border-radius: var(--radius); font-size: clamp(24px, 4vw, 36px); font-weight: 700;
    padding: 18px 34px; min-height: 80px;
  }
  #big-again { background: #ffffff22; color: #fff; border: 2px solid #ffffff66; }
  #big-close { background: #fff; color: #1a2233; }
  #big-note { font-size: clamp(20px, 3vw, 30px); font-weight: 600; color: #b9e6c5; min-height: 1.2em; }
  /* lite overlay (his modes): no buttons to operate, any tap closes, auto-dismisses */
  #big.lite .row, #big.lite #big-note { display: none; }

  /* ---------- visual scenes ---------- */
  .scene-wrap { position: relative; max-width: 920px; margin: 0 auto; }
  .scene-wrap img { width: 100%; display: block; border-radius: 18px; }
  .spot {
    position: absolute; transform: translate(-50%, -50%);
    background: rgba(255,255,255,.94); color: #1a2233;
    border: 3px solid #1a56a8; border-radius: 999px;
    padding: 10px 16px; font-size: clamp(16px, 2.4vw, 22px); font-weight: 700;
    box-shadow: 0 2px 10px rgba(0,0,0,.35); max-width: 40%;
  }
  .spot.editing { border-color: #b3261e; }

  /* ---------- talk (keyboard) ---------- */
  #talk-out {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    min-height: 90px; padding: 14px 18px; margin-bottom: 10px;
    font-size: clamp(30px, 5vw, 46px); font-weight: 700; line-height: 1.2;
    word-break: break-word;
  }
  #talk-out .cursor { color: var(--blue); animation: blink 1s infinite; font-weight: 400; }
  @keyframes blink { 50% { opacity: 0; } }
  .kb { display: flex; flex-direction: column; gap: 8px; }
  .kb-row { display: flex; gap: 8px; justify-content: center; }
  .key {
    flex: 1; max-width: 110px; min-height: 70px;
    background: var(--card); border-radius: 14px; box-shadow: var(--shadow);
    font-size: clamp(24px, 3.6vw, 34px); font-weight: 700;
  }
  .key.wide { max-width: none; flex: 3; }
  .key.action { background: var(--blue-bg); color: var(--blue); font-size: clamp(20px, 3vw, 28px); }
  .key.speak { background: var(--green-bg); color: var(--green); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip {
    background: var(--card); border-radius: 999px; box-shadow: var(--shadow);
    font-size: clamp(18px, 2.6vw, 24px); font-weight: 600; padding: 12px 20px; min-height: 54px;
  }
  .chip.save { background: var(--amber-bg); }

  /* ---------- choices setup ---------- */
  .choice-input {
    width: 100%; font-size: clamp(22px, 3.2vw, 28px); padding: 14px 16px;
    border-radius: 14px; border: 2px solid #ddd6c8; margin-bottom: 10px;
    font-family: inherit; -webkit-user-select: text; user-select: text;
  }
  .primary-btn {
    width: 100%; background: var(--blue); color: #fff; border-radius: var(--radius);
    font-size: clamp(24px, 3.6vw, 32px); font-weight: 700; min-height: 80px; margin-top: 6px;
  }

  /* ---------- settings ---------- */
  .set-row {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px 18px; margin-bottom: 12px;
  }
  .set-row h3 { margin: 0 0 10px; font-size: 22px; }
  .set-row label { font-size: 18px; color: var(--muted); }
  .set-row select, .set-row input[type=range] { width: 100%; font-size: 20px; padding: 8px; margin-top: 6px; }
  .toggle-btn {
    font-size: 20px; font-weight: 700; padding: 14px 22px; border-radius: 14px;
    background: var(--blue-bg); color: var(--blue); margin-right: 8px; margin-top: 4px; min-height: 60px;
  }
  .toggle-btn.on { background: var(--blue); color: #fff; }
  .person-row { display: flex; align-items: center; gap: 14px; padding: 8px 0; border-bottom: 1px solid #eee7da; }
  .person-row img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
  .person-row .nm { flex: 1; font-size: 22px; font-weight: 700; }
  .person-row .rm { background: var(--red-bg); color: var(--red); border-radius: 12px; padding: 10px 16px; font-size: 18px; font-weight: 700; min-height: 50px; }

  #gear {
    position: fixed; right: 12px; bottom: 10px; z-index: 10;
    background: none; font-size: 24px; opacity: .35; padding: 10px;
  }

  /* ---------- category colour coding ---------- */
  .tile.c-need   { background: #fdf3dd; }
  .tile.c-day    { background: #e0f1ef; }
  .tile.c-sport  { background: #e5f2dd; }
  .tile.c-words  { background: #f6ead9; }
  .tile.c-heart  { background: #fbe7e7; }
  .tile.c-feel   { background: #f9e6ef; }
  .tile.c-people { background: #ece6f8; }

  /* ---------- recently said ---------- */
  .recent-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .recent-row .chip { background: var(--card); }
  .recent-lbl { font-size: 15px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 2px 6px 6px; }

  /* ---------- phone-size layout ---------- */
  @media (max-width: 540px) {
    #topbar { gap: 6px; padding: 6px 6px 2px; }
    #topbar button { min-height: 62px; border-radius: 16px; }
    #screen { padding: 8px; }
    .grid, .grid.big { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .tile { min-height: 150px; padding: 10px 6px; border-radius: 16px; }
    .grid.big .tile { min-height: 168px; }
    .tile .em { font-size: 64px; }
    .tile .lbl { font-size: 17px; }
    .tile img.pic { width: 96px; height: 96px; }
    .tile img.pic.photo { width: 120px; height: 96px; }
    .tile img.face { width: 92px; height: 92px; }
    .kb, .kb-row { gap: 4px; }
    .key { min-height: 54px; font-size: 19px; border-radius: 10px; }
    .key.action { font-size: 15px; }
    #talk-out { min-height: 64px; font-size: 26px; padding: 10px 12px; }
    .chip { font-size: 16px; padding: 10px 14px; min-height: 46px; }
    .screen-title { font-size: 19px; }
    .backbtn { font-size: 16px; padding: 10px 16px; }
  }
  /* dark theme: applies on system dark unless forced light, or when forced dark */
  @media (prefers-color-scheme: dark) {
  html:not(.force-light) {
      --bg: #14161b; --card: #232733; --ink: #edeff4; --muted: #a6adbd;
      --green: #86dda0; --green-bg: #1d3a28; --red: #ff9d95; --red-bg: #472326;
      --blue: #8ab4f8; --blue-bg: #1f2c45; --amber-bg: #40351c;
      --shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    html:not(.force-light) .tile.c-need { background: #3b331f; }
    html:not(.force-light) .tile.c-day { background: #1d3331; }
    html:not(.force-light) .tile.c-sport { background: #253420; }
    html:not(.force-light) .tile.c-words { background: #3a2e1e; }
    html:not(.force-light) .tile.c-heart { background: #402426; }
    html:not(.force-light) .tile.c-feel { background: #3a2333; }
    html:not(.force-light) .tile.c-people { background: #2c2745; }
    html:not(.force-light) .tile img.pic { background: #fff; border-radius: 14px; padding: 4px; }
    html:not(.force-light) .choice-input { border-color: #3a3f4d; background: var(--card); color: var(--ink); }
    html:not(.force-light) .person-row { border-bottom-color: #343947; }
    html:not(.force-light) .tile img.face { border-color: #3a3f4d; }
    html:not(.force-light) .primary-btn { background: #2b5ea8; color: #fff; }
    html:not(.force-light) .toggle-btn.on { color: #10141c; }
  }
  html.force-dark {
    --bg: #14161b; --card: #232733; --ink: #edeff4; --muted: #a6adbd;
    --green: #86dda0; --green-bg: #1d3a28; --red: #ff9d95; --red-bg: #472326;
    --blue: #8ab4f8; --blue-bg: #1f2c45; --amber-bg: #40351c;
    --shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  html.force-dark .tile.c-need { background: #3b331f; }
  html.force-dark .tile.c-day { background: #1d3331; }
  html.force-dark .tile.c-sport { background: #253420; }
  html.force-dark .tile.c-words { background: #3a2e1e; }
  html.force-dark .tile.c-heart { background: #402426; }
  html.force-dark .tile.c-feel { background: #3a2333; }
  html.force-dark .tile.c-people { background: #2c2745; }
  html.force-dark .tile img.pic { background: #fff; border-radius: 14px; padding: 4px; }
  html.force-dark .choice-input { border-color: #3a3f4d; background: var(--card); color: var(--ink); }
  html.force-dark .person-row { border-bottom-color: #343947; }
  html.force-dark .tile img.face { border-color: #3a3f4d; }
  html.force-dark .primary-btn { background: #2b5ea8; color: #fff; }
  html.force-dark .toggle-btn.on { color: #10141c; }

  /* ---------- one-column layout (right visual-field loss / left-hand reach) ---------- */
  html.one-col .grid, html.one-col .grid.big, html.one-col .grid.fill2 { grid-template-columns: minmax(0, 440px); justify-content: flex-start; }
  html.one-col .grid.fill2 .tile { min-height: 30vh; }
  html.one-col .grid.fill2 .tile img.pic { width: min(70vw, 24vh); height: min(70vw, 22vh); }
  html.one-col .grid.fill2 .tile .em { font-size: min(30vw, 18vh); }
  html.one-col #topbar { flex-wrap: wrap; max-width: 464px; }
  html.one-col #btn-yes, html.one-col #btn-no { flex: 1 1 100%; min-height: 76px; }
  html.one-col #btn-again, html.one-col #btn-home { flex: 1 1 40%; min-height: 64px; }
  html.one-col #big { align-items: flex-start; text-align: left; padding-left: 5vw; }
  html.one-col .scene-wrap { margin: 0; }
</style>
</head>
<body>

<div id="topbar">
  <button id="btn-yes">👍 YES</button>
  <button id="btn-no">👎 NO</button>
  <button id="btn-again" title="Say that again">🔊</button>
  <button id="btn-home">🏠</button>
</div>

<div id="screen"></div>

<button id="gear">⚙️</button>

<div id="big">
  <div id="big-icon" class="em"></div>
  <div id="big-txt" class="txt"></div>
  <div id="big-note"></div>
  <div class="row">
    <button id="big-again">🔊 Say again</button>
    <button id="big-close">Back</button>
  </div>
</div>

<script src="./app.js?v=24"></script>
</body>
</html>
